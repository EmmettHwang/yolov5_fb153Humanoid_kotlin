name: robo_commander
description: fb153 휴머노이드 로봇 Bluetooth 제어 앱
publish_to: 'none'
version: 1.1.250520193425+19

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # Local storage
  shared_preferences: 2.5.3

  # Camera
  camera: 0.11.1

  # TFLite 추론 (YOLOv5)
  tflite_flutter: 0.10.4

  # 이미지 처리 (카메라 프레임 전처리)
  image: 4.1.7

  # Permissions
  permission_handler: 11.3.1

  # HTTP
  http: 1.5.0

  # 음성 인식 (STT)
  speech_to_text: 6.6.2

  # TTS (로봇 음성 출력)
  flutter_tts: 4.0.2

  # MP3 재생 (버튼 연동)
  audioplayers: 6.1.0

  # 파일 탐색기 (MP3 파일 선택)
  file_picker: 8.1.4

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/models/
    - assets/images/
