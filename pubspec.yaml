name: robo_commander
description: fb153 휴머노이드 로봇 Bluetooth 제어 앱
publish_to: 'none'
version: 0.9.250520+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: 6.1.5+1

  # Local storage
  shared_preferences: 2.5.3

  # Bluetooth Classic (Android)
  flutter_bluetooth_serial: 0.4.0

  # Camera
  camera: 0.11.1

  # Permissions
  permission_handler: 11.3.1

  # HTTP
  http: 1.5.0

  # 음성 인식 (STT)
  speech_to_text: 6.6.2

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/
    - assets/models/
    - assets/images/
